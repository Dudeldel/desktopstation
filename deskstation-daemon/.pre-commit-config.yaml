repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (uv run ruff)
        entry: uv run --project deskstation-daemon ruff check --fix
        language: system
        types: [python]
        files: ^deskstation-daemon/
        pass_filenames: true

      - id: ruff-format
        name: ruff-format (uv run ruff format)
        entry: uv run --project deskstation-daemon ruff format
        language: system
        types: [python]
        files: ^deskstation-daemon/
        pass_filenames: true

      - id: mypy
        name: mypy (uv run mypy --strict)
        entry: bash -c 'cd deskstation-daemon && uv run mypy src/'
        language: system
        types: [python]
        files: ^deskstation-daemon/src/
        pass_filenames: false
