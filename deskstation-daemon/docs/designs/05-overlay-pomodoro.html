<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Pomodoro — focus mode</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Overlay: Pomodoro active (fullscreen focus mode)</h1>

<div class="stage" style="background:#000;">

  <!-- DnD label top -->
  <div style="position:absolute; top:16px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:8px; padding:6px 14px; background:rgba(255,255,255,0.04); border-radius:20px; border:0.5px solid rgba(255,255,255,0.08);">
    <span style="font-size:12px; color:#5f5e5a;">🔕</span>
    <span style="font-size:11px; color:#8a8a90; letter-spacing:0.5px;">DO NOT DISTURB</span>
  </div>

  <!-- Task context -->
  <div style="position:absolute; top:56px; left:0; right:0; text-align:center;">
    <div style="font-size:11px; color:#5f5e5a; font-family:ui-monospace,monospace; letter-spacing:1px; text-transform:uppercase;">DEV-1234</div>
    <div style="font-size:14px; color:#888780; margin-top:4px;">Refactor auth middleware</div>
  </div>

  <!-- Big timer centered -->
  <div style="display:flex; align-items:center; justify-content:center; height:100%;">
    <div style="display:flex; flex-direction:column; align-items:center;">
      <div style="display:flex; align-items:baseline; gap:4px; font-family:ui-monospace,monospace;">
        <span style="font-size:140px; font-weight:200; color:#e8e8ea; line-height:1; letter-spacing:-4px;">14</span>
        <span style="font-size:140px; font-weight:200; color:#5f5e5a; line-height:1; letter-spacing:-4px;">:</span>
        <span style="font-size:140px; font-weight:200; color:#e8e8ea; line-height:1; letter-spacing:-4px;">07</span>
      </div>

      <div style="width:480px; margin-top:20px;">
        <div style="height:2px; background:rgba(255,255,255,0.08); border-radius:1px; overflow:hidden;">
          <div style="width:44%; height:100%; background:#1d9e75;"></div>
        </div>
        <div style="display:flex; justify-content:space-between; margin-top:8px;">
          <span style="font-size:11px; color:#5f5e5a; font-family:ui-monospace,monospace;">10:53 / 25:00</span>
          <span style="font-size:11px; color:#5f5e5a;">🍅 4. dziś</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Actions at bottom -->
  <div style="position:absolute; bottom:30px; left:0; right:0; display:flex; justify-content:center; gap:12px;">
    <button style="background:rgba(255,255,255,0.04); border:0.5px solid rgba(255,255,255,0.12); color:#c8c8cc; padding:12px 24px; border-radius:8px; font-size:13px; cursor:pointer;">
      ⏸ Pauza
    </button>
    <button style="background:rgba(29,158,117,0.12); border:0.5px solid #1d9e75; color:#1d9e75; padding:12px 24px; border-radius:8px; font-size:13px; cursor:pointer;">
      ✓ Zakończ i loguj
    </button>
  </div>

</div>

<p class="caption">
  Pełen ekran czarny = focus mode. DnD włączony, dbus notyfikacje wyciszone.<br>
  "Zakończ i loguj" loguje rzeczywisty czas do Jiry (nawet jeśli &lt; 25 min).
</p>

</body>
</html>
